<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BBNJ Vote Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'DM Sans',-apple-system,sans-serif;color:#1a1a2e;line-height:1.6;background:#fafaf7;padding:1rem 0.75rem 2rem;max-width:100%;margin:0 auto}
  .hdr{text-align:center;margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:3px solid #1a1a2e}
  .hdr h1{font-family:'DM Serif Display',Georgia,serif;font-size:clamp(1.5rem,3.5vw,2.2rem);letter-spacing:-0.02em;line-height:1.15;margin-bottom:0.35rem}
  .hdr p{color:#6b7280;font-size:0.85rem;max-width:520px;margin:0 auto}
  .key{display:flex;flex-wrap:wrap;gap:0.5rem 1rem;justify-content:center;margin-bottom:1.5rem;font-size:0.72rem;color:#6b7280;padding:0.6rem 0.75rem;background:#fff;border:1px solid #e5e5dd;border-radius:8px}
  .key span{display:flex;align-items:center;gap:0.25rem}
  .key .dot{width:8px;height:8px;border-radius:50%;display:inline-block}
  .dot-y{background:#2d6a4f}.dot-n{background:#c1292e}.dot-a{background:#9ca3af}.dot-ab{background:#e07a36}.dot-endorsed{background:#1d6fa5}
  .tbl-wrap{overflow-x:auto;margin-bottom:2rem;border-radius:10px;border:1px solid #e5e5dd}
  table{width:100%;border-collapse:collapse;background:#fff;font-size:0.75rem}
  thead th{background:#1a1a2e;color:#fff;padding:0.5rem 0.35rem;text-align:center;font-weight:600;font-size:0.65rem;letter-spacing:0.03em;text-transform:uppercase;position:sticky;top:0}
  thead th:first-child,thead th:nth-child(2),thead th:nth-child(3){text-align:left}
  thead th.endorsed{background:#1d4e7a}
  tbody td{padding:0.45rem 0.35rem;text-align:center;border-bottom:1px solid #f0f0ec}
  tbody td:first-child{font-weight:600;text-align:left;white-space:nowrap}
  tbody td:nth-child(2){text-align:left;max-width:160px}
  tbody td:nth-child(3){text-align:left}
  tbody td:last-child{text-align:left;font-size:0.7rem;color:#6b7280;max-width:140px}
  tbody tr:hover{background:#f7f7f3}
  .vote{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:50%;font-weight:700;font-size:0.65rem;color:#fff}
  .v-y{background:#2d6a4f}.v-n{background:#c1292e}.v-a{background:#9ca3af}.v-ab{background:#e07a36}
  .v-empty{background:transparent;color:#d1d5db;border:2px dashed #e5e5dd}
  .pos{font-size:0.6rem;font-weight:700;letter-spacing:0.04em;text-transform:uppercase;padding:0.12rem 0.4rem;border-radius:100px;white-space:nowrap}
  .pos-support{background:#d8f3dc;color:#2d6a4f}.pos-oppose{background:#fce4e4;color:#c1292e}.pos-amend{background:#fde8d0;color:#e07a36}
  .result-pass{color:#2d6a4f;font-weight:700}.result-fail{color:#c1292e;font-weight:700}.result-pending{color:#6b7280;font-style:italic}
  .foot{text-align:center;margin-top:2rem;padding-top:1.25rem;border-top:2px solid #e5e5dd;font-size:0.82rem;color:#6b7280}
  .foot a{color:#2d6a4f;text-decoration:none;font-weight:600}
  .msg{text-align:center;padding:2rem 1rem;color:#6b7280;font-size:0.9rem}
  @media(max-width:768px){table{font-size:0.78rem}thead th,tbody td{padding:0.5rem 0.4rem}.vote{width:24px;height:24px;font-size:0.7rem}}
</style>
</head>
<body>
  <div class="hdr">
    <h1>Council Vote Tracker</h1>
    <p>Tracking Jersey City Council votes on housing, transit, street safety, and parks.</p>
  </div>
  <div class="key">
    <span><span class="dot dot-y"></span> Yes </span>
    <span><span class="dot dot-n"></span> No </span>
    <span><span class="dot dot-a"></span> Absent</span>
    <span><span class="dot dot-ab"></span> Abstain</span>
    <span><span class="dot dot-endorsed"></span> BBNJ Endorsed</span>
  </div>
  <div id="output"><div class="msg">Loading votes…</div></div>
  <div class="foot">Maintained by <a href="https://betterblocksnj.org" target="_blank">Better Blocks New Jersey</a></div>

<script>
var out = document.getElementById('output');
var csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSgHURboOC54C3uPH2xvU54MiOji3Hb4KdizGD4ffgXdNE3wI7C7jgI4xJ3R2oF2UwfjhQxHCRJY7jB/pub?gid=312017835&single=true&output=csv';

fetch(csvUrl)
  .then(function(response) {
    if (!response.ok) throw new Error('HTTP ' + response.status);
    return response.text();
  })
  .then(function(text) {
    if (!text || text.length < 5) {
      out.innerHTML = '<div class="msg">No data received.</div>';
      return;
    }

    // Parse CSV handling multi-line quoted fields
    var rows = [];
    var current = '';
    var inQuotes = false;
    var lines = text.split('\n');
    for (var li = 0; li < lines.length; li++) {
      if (inQuotes) { current += '\n' + lines[li]; } else { current = lines[li]; }
      var qc = (current.match(/"/g) || []).length;
      inQuotes = qc % 2 !== 0;
      if (!inQuotes) {
        var cells = [];
        var cur = '';
        var q = false;
        for (var j = 0; j < current.length; j++) {
          var ch = current[j];
          if (q) {
            if (ch === '"' && current[j+1] === '"') { cur += '"'; j++; }
            else if (ch === '"') { q = false; }
            else { cur += ch; }
          } else {
            if (ch === '"') { q = true; }
            else if (ch === ',') { cells.push(cur.trim()); cur = ''; }
            else { cur += ch; }
          }
        }
        cells.push(cur.trim());
        rows.push(cells);
        current = '';
      }
    }

    // Find header row containing #
    var hi = -1;
    for (var i = 0; i < rows.length; i++) {
      if (rows[i][0] && rows[i][0].trim() === '#') { hi = i; break; }
    }
    if (hi === -1) {
      out.innerHTML = '<div class="msg">Could not find vote data headers.</div>';
      return;
    }

    // Get numbered data rows (skip endorsement row)
    var data = [];
    for (var i = hi + 1; i < rows.length; i++) {
      var first = (rows[i][0] || '').trim();
      if (first && !isNaN(parseInt(first))) data.push(rows[i]);
    }

    if (data.length === 0) {
      out.innerHTML = '<div class="msg">No votes recorded yet. Check back after the next council meeting.</div>';
      return;
    }

    // Columns: 0=#, 1=Date, 2=Ordinance, 3=Topic, 4=BBNJ Position,
    // 5=Ridley, 6=Brooks, 7=Zuppa, 8=Ephros, 9=Little, 10=Gilmore,
    // 11=Lavarro, 12=Griffin, 13=Singh, 14=Result, 15=Notes

    function vt(val) {
      if (!val) return '<span class="vote v-empty">–</span>';
      var u = val.trim().toLowerCase();
      if (u === 'y' || u === 'yes') return '<span class="vote v-y">Y</span>';
      if (u === 'n' || u === 'no') return '<span class="vote v-n">N</span>';
      if (u === 'a' || u === 'absent') return '<span class="vote v-a">A</span>';
      if (u === 'ab' || u === 'abstain') return '<span class="vote v-ab">AB</span>';
      return '<span class="vote v-empty">–</span>';
    }
    function ps(val) {
      if (!val) return '';
      var l = val.toLowerCase();
      if (l.indexOf('support') !== -1) return '<span class="pos pos-support">✔ Support</span>';
      if (l.indexOf('oppose') !== -1) return '<span class="pos pos-oppose">✘ Oppose</span>';
      if (l.indexOf('amend') !== -1) return '<span class="pos pos-amend">✘ Amend</span>';
      return '<span class="pos">' + val + '</span>';
    }

    var h = '<div class="tbl-wrap"><table><thead><tr>' +
      '<th>#</th><th>Ordinance / Resolution</th><th>BBNJ Position</th>' +
      '<th class="endorsed">Ridley<br><small>Ward A</small></th>' +
      '<th>Brooks<br><small>Ward B</small></th>' +
      '<th class="endorsed">Zuppa<br><small>Ward C</small></th>' +
      '<th>Ephros<br><small>Ward D</small></th>' +
      '<th class="endorsed">Little<br><small>Ward E</small></th>' +
      '<th>Gilmore<br><small>Ward F</small></th>' +
      '<th>Lavarro<br><small>At-Lg</small></th>' +
      '<th>Griffin<br><small>At-Lg</small></th>' +
      '<th>Singh<br><small>At-Lg</small></th>' +
      '<th>Result</th>' +
      '<th>Notes</th></tr></thead><tbody>';

    for (var i = 0; i < data.length; i++) {
      var r = data[i];
      var g = function(idx) { return (r[idx] || '').trim(); };
      var res = g(14);
      var cls = res.toLowerCase().indexOf('pass') !== -1 ? 'result-pass' : res.toLowerCase().indexOf('fail') !== -1 ? 'result-fail' : 'result-pending';
      h += '<tr>' +
        '<td>' + g(0) + '</td>' +
        '<td>' + g(2) + '</td>' +
        '<td>' + ps(g(4)) + '</td>' +
        '<td>' + vt(g(5)) + '</td>' +
        '<td>' + vt(g(6)) + '</td>' +
        '<td>' + vt(g(7)) + '</td>' +
        '<td>' + vt(g(8)) + '</td>' +
        '<td>' + vt(g(9)) + '</td>' +
        '<td>' + vt(g(10)) + '</td>' +
        '<td>' + vt(g(11)) + '</td>' +
        '<td>' + vt(g(12)) + '</td>' +
        '<td>' + vt(g(13)) + '</td>' +
        '<td class="' + cls + '">' + (res || 'Pending') + '</td>' +
        '<td>' + g(15) + '</td>' +
        '</tr>';
    }
    h += '</tbody></table></div>';
    out.innerHTML = h;
  })
  .catch(function(err) {
    out.innerHTML = '<div class="msg">Error loading data: ' + err.message + '. Try refreshing the page.</div>';
  });
</script>
</body>
</html>
