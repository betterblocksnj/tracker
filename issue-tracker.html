<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BBNJ Issue Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'DM Sans',-apple-system,sans-serif;color:#1a1a2e;line-height:1.6;background:#fafaf7;padding:1.5rem 1.25rem 2rem;max-width:960px;margin:0 auto}
  .hdr{text-align:center;margin-bottom:2rem;padding-bottom:1.5rem;border-bottom:3px solid #1a1a2e}
  .hdr h1{font-family:'DM Serif Display',Georgia,serif;font-size:clamp(1.75rem,4vw,2.5rem);letter-spacing:-0.02em;line-height:1.15;margin-bottom:0.35rem}
  .hdr p{color:#6b7280;font-size:0.95rem;max-width:520px;margin:0 auto}
  .flt{display:flex;flex-wrap:wrap;gap:0.5rem;margin-bottom:1.75rem;justify-content:center}
  .fb{font-family:'DM Sans',sans-serif;font-size:0.8rem;font-weight:600;letter-spacing:0.04em;text-transform:uppercase;padding:0.4rem 1rem;border:2px solid #e5e5dd;border-radius:100px;background:#fff;color:#6b7280;cursor:pointer;transition:all 0.2s}
  .fb:hover{border-color:#1a1a2e;color:#1a1a2e}
  .fb.on{background:#1a1a2e;border-color:#1a1a2e;color:#fff}
  .lst{display:flex;flex-direction:column;gap:1rem}
  .cd{background:#fff;border:1px solid #e5e5dd;border-radius:10px;padding:1.25rem 1.5rem;transition:box-shadow 0.2s,border-color 0.2s}
  .cd:hover{box-shadow:0 4px 20px rgba(0,0,0,0.06);border-color:#ccc}
  .cd .rw{display:flex;align-items:flex-start;justify-content:space-between;gap:0.75rem;margin-bottom:0.6rem;flex-wrap:wrap}
  .cd h3{font-family:'DM Serif Display',Georgia,serif;font-size:1.2rem;line-height:1.3;flex:1;min-width:200px;margin:0}
  .br{display:flex;gap:0.4rem;flex-wrap:wrap;align-items:center}
  .b{font-size:0.7rem;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;padding:0.2rem 0.65rem;border-radius:100px;white-space:nowrap;display:inline-block}
  .b-cat{background:#e5e5dd;color:#1a1a2e}
  .b-support{background:#d8f3dc;color:#2d6a4f}
  .b-oppose{background:#fce4e4;color:#c1292e}
  .b-monitor{background:#dbeef9;color:#1d6fa5}
  .b-amend{background:#fde8d0;color:#e07a36}
  .b-won{background:#d8f3dc;color:#2d6a4f}
  .b-pending{background:#fef3c7;color:#92400e}
  .b-tabled{background:#fce4e4;color:#c1292e}
  .b-reading{background:#dbeef9;color:#1d6fa5}
  .b-advocacy{background:#ede9fe;color:#6d28d9}
  .b-default{background:#e5e5dd;color:#6b7280}
  .mt{font-size:0.85rem;color:#6b7280;margin-bottom:0.5rem}
  .ns{font-size:0.82rem;color:#e07a36;font-weight:600;margin-top:0.35rem}
  .ns::before{content:'→ '}
  .dt{display:flex;flex-wrap:wrap;gap:0.35rem 1.5rem;font-size:0.82rem;color:#6b7280;margin-top:0.6rem;padding-top:0.6rem;border-top:1px solid #e5e5dd}
  .dt span::before{content:'';display:inline-block;width:4px;height:4px;background:#e5e5dd;border-radius:50%;margin-right:0.45rem;vertical-align:middle}
  .dt a{color:#2d6a4f;text-decoration:none;font-weight:500}
  .dt a:hover{text-decoration:underline}
  .empty{text-align:center;padding:3rem 1rem;color:#6b7280}
  .foot{text-align:center;margin-top:2.5rem;padding-top:1.25rem;border-top:2px solid #e5e5dd;font-size:0.82rem;color:#6b7280}
  .foot a{color:#2d6a4f;text-decoration:none;font-weight:600}
  @media(max-width:600px){body{padding:1.25rem 1rem 2rem}.cd{padding:1rem 1.15rem}.cd h3{font-size:1.05rem}.dt{flex-direction:column;gap:0.25rem}}
</style>
</head>
<body>
  <div class="hdr">
    <h1>Key Issue Tracker</h1>
    <p>Tracking priority policy issues through the legislative process in Jersey City and New Jersey.</p>
  </div>
  <div class="flt" id="filters"></div>
  <div class="lst" id="cards"></div>
  <div class="foot">Maintained by <a href="https://betterblocksnj.org" target="_blank">Better Blocks New Jersey</a></div>

<script>
(function(){
  var CSV='https://docs.google.com/spreadsheets/d/e/2PACX-1vSgHURboOC54C3uPH2xvU54MiOji3Hb4KdizGD4ffgXdNE3wI7C7jgI4xJ3R2oF2UwfjhQxHCRJY7jB/pub?gid=1518936458&single=true&output=csv';
  var fe=document.getElementById('filters'),le=document.getElementById('cards');
  var issues=[],cats=['All'],af='All';

  function pc(t){var r=[],c='',q=false,ls=t.split('\n');for(var i=0;i<ls.length;i++){if(q){c+='\n'+ls[i]}else{c=ls[i]}var qc=(c.match(/"/g)||[]).length;q=qc%2!==0;if(!q){r.push(pr(c));c=''}}return r}
  function pr(r){var c=[],u='',q=false;for(var i=0;i<r.length;i++){var h=r[i];if(q){if(h==='"'&&r[i+1]==='"'){u+='"';i++}else if(h==='"'){q=false}else{u+=h}}else{if(h==='"'){q=true}else if(h===','){c.push(u.trim());u=''}else{u+=h}}}c.push(u.trim());return c}

  function toIssues(rows){
    var hi=-1;
    for(var i=0;i<rows.length;i++){if(rows[i][0]&&rows[i][0].toLowerCase().indexOf('issue')!==-1&&rows[i][1]&&rows[i][1].toLowerCase().indexOf('category')!==-1){hi=i;break}}
    if(hi===-1)hi=3;
    var hd=rows[hi].map(function(h){return h.toLowerCase().trim()});
    var dr=rows.slice(hi+1).filter(function(r){return r[0]&&r[0].trim()});
    function col(n){return hd.findIndex(function(h){return h.indexOf(n)!==-1})}
    var a=col('issue'),b=col('category'),c=col('position'),d=col('status'),e=col('introduced'),f=col('last action'),g=col('supporter'),h=col('opponent'),j=col('next'),k=col('coverage')!==-1?col('coverage'):col('link');
    return dr.map(function(r){
      function gt(x){return(x>=0&&r[x])?r[x].trim():''}
      var lk=gt(k),um=lk.match(/https?:\/\/[^\s,)]+/);
      return{issue:gt(a),category:gt(b),position:gt(c),status:gt(d),introduced:gt(e),lastAction:gt(f),supporters:gt(g),opponents:gt(h),nextStep:gt(j),link:um?um[0]:'',linkLabel:lk}
    }).filter(function(i){return i.issue})
  }

  function posC(p){var l=p.toLowerCase();if(l.indexOf('support')===0)return'b-support';if(l.indexOf('oppose')===0)return'b-oppose';if(l.indexOf('monitor')===0)return'b-monitor';return'b-amend'}
  function statC(s){var l=s.toLowerCase();if(l.indexOf('won')!==-1)return'b-won';if(l.indexOf('pending')!==-1)return'b-pending';if(l.indexOf('tabled')!==-1)return'b-tabled';if(l.indexOf('reading')!==-1||l.indexOf('introduced')!==-1)return'b-reading';if(l.indexOf('advocacy')!==-1||l.indexOf('campaign')!==-1)return'b-advocacy';return'b-default'}

  function rF(){
    fe.innerHTML=cats.map(function(c){return'<button class="fb'+(c===af?' on':'')+'" data-c="'+c+'">'+c+'</button>'}).join('');
    fe.querySelectorAll('.fb').forEach(function(b){b.addEventListener('click',function(){af=b.getAttribute('data-c');rF();rC()})})
  }
  function rC(){
    var f=af==='All'?issues:issues.filter(function(i){return i.category===af});
    if(!f.length){le.innerHTML='<div class="empty">No issues in this category yet.</div>';return}
    le.innerHTML=f.map(function(i){
      var pl=i.position.length>20?i.position.split(';')[0].trim()+'…':i.position;
      var d=[];
      if(i.supporters)d.push('<span><strong>Supporters:</strong> '+i.supporters+'</span>');
      if(i.opponents)d.push('<span><strong>Opponents:</strong> '+i.opponents+'</span>');
      if(i.introduced)d.push('<span>Introduced '+i.introduced+'</span>');
      if(i.lastAction)d.push('<span>Last action '+i.lastAction+'</span>');
      if(i.link&&i.linkLabel)d.push('<span><a href="'+i.link+'" target="_blank">'+i.linkLabel+'</a></span>');
      else if(i.linkLabel)d.push('<span>'+i.linkLabel+'</span>');
      return'<div class="cd"><div class="rw"><h3>'+i.issue+'</h3><div class="br"><span class="b b-cat">'+i.category+'</span><span class="b '+posC(i.position)+'" title="'+i.position+'">'+pl+'</span>'+(i.status?'<span class="b '+statC(i.status)+'">'+i.status+'</span>':'')+'</div></div>'+(i.position.length>20?'<div class="mt">'+i.position+'</div>':'')+(i.nextStep?'<div class="ns">Next: '+i.nextStep+'</div>':'')+(d.length?'<div class="dt">'+d.join('')+'</div>':'')+'</div>'
    }).join('')
  }

  le.innerHTML='<div class="empty">Loading issues…</div>';
  fetch(CSV).then(function(r){if(!r.ok)throw new Error('err');return r.text()}).then(function(csv){
    issues=toIssues(pc(csv));
    var cs=[];issues.forEach(function(i){if(cs.indexOf(i.category)===-1)cs.push(i.category)});
    cats=['All'].concat(cs);rF();rC()
  }).catch(function(e){console.error(e);le.innerHTML='<div class="empty">Unable to load data. Please refresh.</div>'})
})();
</script>
</body>
</html>
